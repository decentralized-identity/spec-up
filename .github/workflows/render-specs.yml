name: spec-up-render

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Stage Pages artifact
        run: |
          rm -rf .site
          mkdir -p .site
          cp index.html .site/index.html
          cp logo.svg .site/logo.svg
          cp -R assets .site/assets
          cp -R fonts .site/fonts
          cp -R single-file-test .site/single-file-test
          cp -R multi-file-test .site/multi-file-test

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
